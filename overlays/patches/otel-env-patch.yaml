apiVersion: apps/v1
kind: Deployment
metadata:
  name: cartservice
spec:
  template:
    spec:
      containers:
        - name: server
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otelcol-jaeger:4317"
            - name: COLLECTOR_SERVICE_ADDR   # ← add this
              value: "otelcol-jaeger:4317"   # no http://, gRPC addr
---
