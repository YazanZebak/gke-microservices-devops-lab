apiVersion: v1
kind: ConfigMap
metadata:
  name: otelcol-jaeger-config
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    exporters:
      otlp/jaeger:
        endpoint: "jaeger:4317"
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [otlp/jaeger]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otelcol-jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otelcol-jaeger
  template:
    metadata:
      labels:
        app: otelcol-jaeger
    spec:
      containers:
        - name: otelcol
          image: otel/opentelemetry-collector-contrib:0.99.0
          args: ["--config=/conf/config.yaml"]
          volumeMounts:
            - name: config
              mountPath: /conf
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: otelcol-jaeger-config
---
apiVersion: v1
kind: Service
metadata:
  name: otelcol-jaeger
spec:
  selector:
    app: otelcol-jaeger
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318